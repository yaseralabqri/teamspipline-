<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yassir Pipeline — Moyasar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1E1908; color: #F4F2EA; min-height: 100vh; }

header { padding: 18px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.brand { display: flex; align-items: center; gap: 12px; }
.logo-wrap { width: 36px; height: 36px; background: #B4AEF5; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 6px; flex-shrink: 0; }
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; filter: invert(13%) sepia(20%) saturate(800%) hue-rotate(20deg) brightness(40%); }
.brand-text h1 { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
.brand-text p { font-size: 11px; color: #B8B3A0; margin-top: 1px; }

.hstats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.stat { text-align: right; }
.stat-val { font-size: 18px; font-weight: 600; color: #B4AEF5; }
.stat-lbl { font-size: 11px; color: #B8B3A0; }
.hbtn { background: transparent; border: 1px solid #45401F; color: #B8B3A0; border-radius: 7px; padding: 7px 13px; font-size: 12px; cursor: pointer; font-family: inherit; }
.hbtn:hover { border-color: #B4AEF5; color: #B4AEF5; }
.hbtn.danger:hover { border-color: #f08c8b; color: #f08c8b; }

.toolbar { padding: 14px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.toolbar input[type=text] { background: #29220F; border: 1px solid #45401F; color: #F4F2EA; border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: inherit; width: 200px; }
.toolbar input[type=text]:focus { outline: none; border-color: #B4AEF5; }
.add-btn { background: #B4AEF5; color: #1E1908; border: none; border-radius: 7px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
.add-btn:hover { background: #c8c3fa; }
.view-toggle { display: flex; background: #29220F; border: 1px solid #45401F; border-radius: 7px; overflow: hidden; margin-left: auto; }
.view-btn { background: transparent; border: none; color: #B8B3A0; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
.view-btn.active { background: #45401F; color: #F4F2EA; }

.save-indicator { font-size: 11px; color: #5DCAA5; padding: 0 20px 8px; display: none; }
.save-indicator.show { display: block; }

/* BOARD */
.board { display: flex; gap: 10px; padding: 0 20px 30px; overflow-x: auto; }
.col { flex-shrink: 0; width: 260px; display: flex; flex-direction: column; gap: 8px; }
.col-header { padding: 10px 12px; border-radius: 9px; display: flex; align-items: center; justify-content: space-between; }
.col-title { font-size: 13px; font-weight: 600; }
.col-count { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
.col-body { flex: 1; display: flex; flex-direction: column; gap: 7px; min-height: 80px; padding: 4px 0; }

.stage-new .col-header { background: #29220F; }
.stage-new .col-title { color: #B8B3A0; }
.stage-new .col-count { background: #45401F; color: #B8B3A0; }
.stage-discovery .col-header { background: rgba(56,138,221,.12); }
.stage-discovery .col-title { color: #85B7EB; }
.stage-discovery .col-count { background: rgba(56,138,221,.2); color: #85B7EB; }
.stage-proposal .col-header { background: rgba(180,174,245,.12); }
.stage-proposal .col-title { color: #B4AEF5; }
.stage-proposal .col-count { background: rgba(180,174,245,.2); color: #B4AEF5; }
.stage-negotiation .col-header { background: rgba(239,159,39,.12); }
.stage-negotiation .col-title { color: #EF9F27; }
.stage-negotiation .col-count { background: rgba(239,159,39,.2); color: #EF9F27; }
.stage-won .col-header { background: rgba(93,202,165,.12); }
.stage-won .col-title { color: #5DCAA5; }
.stage-won .col-count { background: rgba(93,202,165,.2); color: #5DCAA5; }
.stage-lost .col-header { background: rgba(226,75,74,.1); }
.stage-lost .col-title { color: #f08c8b; }
.stage-lost .col-count { background: rgba(226,75,74,.18); color: #f08c8b; }

.card { background: #29220F; border: 1px solid #45401F; border-radius: 9px; padding: 12px 13px; position: relative; cursor: grab; transition: border-color .15s; }
.card:hover { border-color: #6B6535; }
.card:active { cursor: grabbing; opacity: .85; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
.card-name { font-size: 13px; font-weight: 600; padding-right: 18px; }
.card-prob { font-size: 12px; font-weight: 600; white-space: nowrap; }
.prob-high { color: #5DCAA5; }
.prob-mid { color: #EF9F27; }
.prob-low { color: #f08c8b; }
.card-industry { font-size: 11px; color: #B8B3A0; margin-bottom: 6px; }
.card-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
.lbl { color: #B8B3A0; }
.val { color: #F4F2EA; font-weight: 500; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag-product { background: rgba(180,174,245,.15); color: #B4AEF5; }
.tag-risk { background: rgba(226,75,74,.15); color: #f08c8b; }
.tag-action { background: rgba(93,202,165,.12); color: #5DCAA5; }
.card-footer { margin-top: 7px; padding-top: 7px; border-top: 1px solid #45401F; font-size: 11px; color: #B8B3A0; display: flex; justify-content: space-between; }
.del-btn { position: absolute; top: 8px; right: 8px; background: transparent; border: none; color: #45401F; font-size: 15px; cursor: pointer; padding: 1px 5px; border-radius: 4px; line-height: 1; }
.del-btn:hover { background: rgba(226,75,74,.18); color: #f08c8b; }
.drop-zone { border: 1.5px dashed #45401F; border-radius: 9px; min-height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #45401F; }
.drop-zone.active { border-color: #B4AEF5; color: #B4AEF5; background: rgba(180,174,245,.05); }

/* TABLE */
.table-wrap { padding: 0 20px 40px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1100px; }
thead th { padding: 10px 12px; text-align: left; color: #B8B3A0; font-weight: 500; border-bottom: 1px solid #45401F; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { color: #F4F2EA; }
tbody tr { border-bottom: 1px solid #2D2710; cursor: pointer; }
tbody tr:hover { background: #29220F; }
tbody td { padding: 10px 12px; vertical-align: top; }
.td-name { font-weight: 600; }
.td-muted { color: #B8B3A0; }
.td-gpv { font-weight: 600; color: #B4AEF5; }
.prob-high { color: #5DCAA5; font-weight: 600; }
.prob-mid { color: #EF9F27; font-weight: 600; }
.prob-low { color: #f08c8b; font-weight: 600; }
.stage-pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.pill-new { background: #45401F; color: #B8B3A0; }
.pill-discovery { background: rgba(56,138,221,.18); color: #85B7EB; }
.pill-proposal { background: rgba(180,174,245,.18); color: #B4AEF5; }
.pill-negotiation { background: rgba(239,159,39,.18); color: #EF9F27; }
.pill-won { background: rgba(93,202,165,.15); color: #5DCAA5; }
.pill-lost { background: rgba(226,75,74,.15); color: #f08c8b; }
.td-risk { color: #f08c8b; }
.td-action { color: #5DCAA5; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding: 24px 16px; overflow-y: auto; }
.modal-bg.open { display: flex; }
.modal { background: #29220F; border: 1px solid #45401F; border-radius: 14px; padding: 22px; width: 100%; max-width: 560px; margin: auto; }
.modal h3 { font-size: 16px; margin-bottom: 16px; font-weight: 600; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
.form-grid .full { grid-column: 1 / -1; }
.field label { display: block; font-size: 11px; color: #B8B3A0; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.field input, .field select, .field textarea { width: 100%; background: #1E1908; border: 1px solid #45401F; color: #F4F2EA; border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #B4AEF5; }
.field textarea { min-height: 54px; resize: vertical; }
.field select[multiple] { height: 90px; }
.hint { font-size: 11px; color: #B8B3A0; margin-top: 3px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-btns button { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
.btn-cancel { background: #1E1908; color: #B8B3A0; border: 1px solid #45401F !important; }
.btn-save { background: #B4AEF5; color: #1E1908; }

.toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: #B4AEF5; color: #1E1908; padding: 7px 18px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; }
.hidden { display: none; }
</style>
</head>

<script>
const KEY = 'yassir_pipeline_v1';
const STAGES = [
  {id:'new',label:'New lead'},{id:'discovery',label:'Discovery'},
  {id:'proposal',label:'Proposal sent'},{id:'negotiation',label:'Negotiation'},
  {id:'won',label:'Closed won'},{id:'lost',label:'Closed lost'},
];
const PROB_DEFAULT = {new:10,discovery:25,proposal:50,negotiation:75,won:100,lost:0};

let deals = [];
let dragId = null;
let editId = null;
let view = 'board';
let sortKey = 'updated';
let sortDir = -1;
let saveTimer = null;

function load() {
  try {
    const r = localStorage.getItem(KEY);
    deals = r ? JSON.parse(r) : [];
    if (!Array.isArray(deals)) deals = [];
  } catch(e) { deals = []; }
  render();
  showSaveIndicator();
}

function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify(deals));
    const backup = localStorage.getItem(KEY + '_backup_prev');
    if (backup) localStorage.setItem(KEY + '_backup_prev2', backup);
    localStorage.setItem(KEY + '_backup_prev', JSON.stringify(deals));
    localStorage.setItem(KEY + '_last_saved', new Date().toISOString());
    showSaveIndicator();
  } catch(e) {
    showToast('Storage nearly full — export a backup now');
  }
}

function showSaveIndicator() {
  const el = document.getElementById('save-indicator');
  const ts = localStorage.getItem(KEY + '_last_saved');
  el.textContent = ts ? '✓ Saved to this device · ' + new Date(ts).toLocaleString() : '✓ Saved to this device';
  el.classList.add('show');
}

function uid() { return Date.now() + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }

function setView(v) {
  view = v;
  document.getElementById('view-board').classList.toggle('hidden', v !== 'board');
  document.getElementById('view-table').classList.toggle('hidden', v !== 'table');
  document.getElementById('btn-board').classList.toggle('active', v === 'board');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  render();
}

function sortBy(k) { sortKey === k ? sortDir *= -1 : (sortKey = k, sortDir = -1); render(); }

function openModal(id) {
  editId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit deal' : 'New deal';
  const d = id ? deals.find(x => x.id === id) : {};
  document.getElementById('f-name').value = d.name || '';
  document.getElementById('f-industry').value = d.industry || '';
  document.getElementById('f-gpv').value = d.gpv || '';
  document.getElementById('f-stage').value = d.stage || 'new';
  document.getElementById('f-prob').value = d.prob !== undefined ? d.prob : '';
  document.getElementById('f-close').value = d.closeDate || '';
  document.getElementById('f-owner').value = d.owner || 'Yassir';
  document.getElementById('f-action').value = d.action || '';
  document.getElementById('f-support').value = d.support || '';
  document.getElementById('f-risk').value = d.risk || '';
  const sel = document.getElementById('f-product');
  Array.from(sel.options).forEach(o => o.selected = (d.products||[]).includes(o.value));
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editId = null; }
function bgClick(e) { if (e.target.id === 'modal') closeModal(); }

function saveModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Account name is required'); return; }
  const stage = document.getElementById('f-stage').value;
  const products = Array.from(document.getElementById('f-product').selectedOptions).map(o => o.value);
  const probRaw = document.getElementById('f-prob').value;
  const prob = probRaw !== '' ? +probRaw : PROB_DEFAULT[stage];
  const d = {
    id: editId || uid(),
    name, industry: document.getElementById('f-industry').value,
    gpv: +document.getElementById('f-gpv').value || 0,
    stage, products, prob,
    closeDate: document.getElementById('f-close').value,
    owner: document.getElementById('f-owner').value.trim() || 'Yassir',
    action: document.getElementById('f-action').value.trim(),
    support: document.getElementById('f-support').value.trim(),
    risk: document.getElementById('f-risk').value.trim(),
    updated: today(),
  };
  if (editId) { const i = deals.findIndex(x => x.id === editId); if (i > -1) deals[i] = d; }
  else deals.unshift(d);
  closeModal(); save(); render(); showToast(editId ? 'Deal updated' : 'Deal added');
}

function deleteDeal(id) {
  if (!confirm('Remove this deal from the pipeline?')) return;
  deals = deals.filter(d => d.id !== id);
  save(); render(); showToast('Deal removed');
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return !q ? deals : deals.filter(d =>
    [d.name,d.industry,d.owner,d.action,d.risk,d.support].some(v => (v||'').toLowerCase().includes(q))
  );
}

function sorted(arr) {
  return [...arr].sort((a,b) => {
    let av = a[sortKey]||'', bv = b[sortKey]||'';
    if (['gpv','prob'].includes(sortKey)) { av=+av; bv=+bv; }
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

function render() {
  const list = filtered();
  const active = list.filter(d => d.stage !== 'lost');
  const totalGpv = active.reduce((s,d) => s+(d.gpv||0), 0);
  const weighted = active.reduce((s,d) => s+(d.gpv||0)*(d.prob||0)/100, 0);
  document.getElementById('s-deals').textContent = list.length;
  document.getElementById('s-gpv').textContent = fmt(totalGpv)+' SAR';
  document.getElementById('s-weighted').textContent = fmt(weighted)+' SAR';
  view === 'board' ? renderBoard(list) : renderTable(sorted(list));
}

function renderBoard(list) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  STAGES.forEach(stage => {
    const sd = list.filter(d => d.stage === stage.id);
    const col = document.createElement('div');
    col.className = 'col stage-' + stage.id;
    col.innerHTML = `<div class="col-header"><span class="col-title">${stage.label}</span><span class="col-count">${sd.length}</span></div>
      <div class="col-body" data-stage="${stage.id}" ondragover="dragOver(event)" ondrop="drop(event,this)">
        ${sd.length===0 ? `<div class="drop-zone" ondragover="event.preventDefault();this.classList.add('active')" ondragleave="this.classList.remove('active')" ondrop="drop(event,this.parentElement)">Drop here</div>` : ''}
        ${sd.map(d => cardHTML(d)).join('')}
      </div>`;
    board.appendChild(col);
  });
}

function cardHTML(d) {
  const pc = d.prob>=70?'prob-high':d.prob>=40?'prob-mid':'prob-low';
  const days = daysUntil(d.closeDate);
  let closeLbl = d.closeDate||'No date', closeCol='color:#B8B3A0';
  if (days!==null) {
    if (days<0){closeLbl='Overdue '+Math.abs(days)+'d';closeCol='color:#f08c8b';}
    else if(days===0){closeLbl='Today';closeCol='color:#EF9F27';}
    else if(days<=7){closeLbl='in '+days+'d';closeCol='color:#EF9F27';}
  }
  return `<div class="card" draggable="true" ondragstart="dragStart(event,'${d.id}')" ondblclick="openModal('${d.id}')">
    <button class="del-btn" onclick="event.stopPropagation();deleteDeal('${d.id}')" title="Remove">×</button>
    <div class="card-top"><div class="card-name">${esc(d.name)}</div><div class="card-prob ${pc}">${d.prob!==undefined?d.prob+'%':'—'}</div></div>
    <div class="card-industry">${esc(d.industry||'—')}${d.owner?' · '+esc(d.owner):''}</div>
    <div class="card-row"><span class="lbl">Est. GPV</span><span class="val" style="color:#B4AEF5">${d.gpv?fmt(d.gpv)+' SAR':'—'}</span></div>
    <div class="card-row"><span class="lbl">Close</span><span class="val" style="${closeCol}">${closeLbl}</span></div>
    ${d.products&&d.products.length?`<div class="card-tags">${d.products.map(p=>`<span class="tag tag-product">${esc(p)}</span>`).join('')}</div>`:''}
    ${d.action?`<div class="card-tags"><span class="tag tag-action">▶ ${esc(d.action.length>45?d.action.slice(0,45)+'…':d.action)}</span></div>`:''}
    ${d.risk?`<div class="card-tags"><span class="tag tag-risk">⚠ ${esc(d.risk.length>45?d.risk.slice(0,45)+'…':d.risk)}</span></div>`:''}
    <div class="card-footer"><span>${d.support?'🔧 '+esc(d.support.length>30?d.support.slice(0,30)+'…':d.support):''}</span><span style="color:#45401F">${d.updated||''}</span></div>
  </div>`;
}

function renderTable(list) {
  const tb = document.getElementById('tbl-body');
  if (!list.length) { tb.innerHTML = '<tr><td colspan="12" style="text-align:center;color:#B8B3A0;padding:30px;">No deals — click + New deal to start.</td></tr>'; return; }
  tb.innerHTML = list.map(d => {
    const pc = d.prob>=70?'prob-high':d.prob>=40?'prob-mid':'prob-low';
    const pill = `<span class="stage-pill pill-${d.stage}">${STAGES.find(s=>s.id===d.stage)?.label||d.stage}</span>`;
    return `<tr onclick="openModal('${d.id}')">
      <td class="td-name">${esc(d.name)}</td>
      <td class="td-muted">${esc(d.industry||'—')}</td>
      <td class="td-gpv">${d.gpv?fmt(d.gpv):' —'}</td>
      <td>${pill}</td>
      <td class="td-muted">${(d.products||[]).join(', ')||'—'}</td>
      <td class="${pc}">${d.prob!==undefined?d.prob+'%':'—'}</td>
      <td class="td-muted">${d.closeDate||'—'}</td>
      <td class="td-action">${esc(d.action||'—')}</td>
      <td class="td-muted">${esc(d.owner||'—')}</td>
      <td class="td-muted">${esc(d.support||'—')}</td>
      <td class="td-risk">${esc(d.risk||'—')}</td>
      <td class="td-muted">${d.updated||'—'}</td>
    </tr>`;
  }).join('');
}

function dragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();}
function drop(e,el){
  e.preventDefault();
  const stage=el.dataset.stage||el.closest('[data-stage]')?.dataset.stage;
  if(!stage||!dragId)return;
  const d=deals.find(x=>x.id===dragId);
  if(d&&d.stage!==stage){d.stage=stage;d.prob=PROB_DEFAULT[stage];d.updated=today();save();render();showToast('Moved to '+STAGES.find(s=>s.id===stage).label);}
  dragId=null;
}

function exportCSV() {
  if (!deals.length){showToast('No deals to export');return;}
  const h=['Account Name','Industry','Estimated GPV (SAR)','Deal Stage','Product Scope','Probability (%)','Expected Close Date','Next Action','Deal Owner','Support Needed','Risk / Blocker','Last Updated'];
  const rows=[h,...deals.map(d=>[d.name,d.industry||'',d.gpv||0,STAGES.find(s=>s.id===d.stage)?.label||d.stage,(d.products||[]).join('; '),d.prob||0,d.closeDate||'',d.action||'',d.owner||'',d.support||'',d.risk||'',d.updated||''])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  dl('data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv),'yassir-pipeline-'+today()+'.csv');
  showToast('CSV exported');
}

function backupNow() {
  if(!deals.length){showToast('Nothing to backup yet');return;}
  const data=JSON.stringify({version:1,exported:new Date().toISOString(),deals},null,2);
  dl('data:application/json;charset=utf-8,'+encodeURIComponent(data),'yassir-pipeline-backup-'+today()+'.json');
  showToast('Backup saved — keep this file safe');
}

function importJSON() {
  if(!confirm('Restore from a backup file? This will merge with your current deals (no data deleted).')) return;
  document.getElementById('file-input').click();
}

function restoreFromFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = Array.isArray(data) ? data : (data.deals || []);
      let added = 0;
      imported.forEach(d => { if(d.id && !deals.find(x=>x.id===d.id)){deals.unshift(d);added++;} });
      save(); render(); showToast(added + ' deals restored from backup');
    } catch(err) { showToast('Could not read backup file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function dl(href, filename) { const a=document.createElement('a'); a.href=href; a.download=filename; a.click(); }
function fmt(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':Math.round(n).toLocaleString();}
function daysUntil(ds){if(!ds)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(ds)-t)/86400000);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function esc(s){const d=document.createElement('div');d.innerText=s||'';return d.innerHTML;}

document.getElementById('search').addEventListener('keydown',e=>{if(e.key==='Escape'){e.target.value='';render();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

window.addEventListener('beforeunload', () => { if(deals.length) localStorage.setItem(KEY, JSON.stringify(deals)); });
setInterval(() => { if(deals.length) localStorage.setItem(KEY, JSON.stringify(deals)); }, 30000);

load();
</script>
</body>
