<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPG PIPELINE — Moyasar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1A1600;
  --panel:#241D00;
  --panel2:#2E2600;
  --border:#3D3600;
  --border2:#524A00;
  --accent:#C5BEFF;
  --accent2:#9B94F5;
  --accent-dark:#4A43C0;
  --text:#F5F3E8;
  --muted:#A09880;
  --green:#4DCCA8;
  --amber:#F0A030;
  --red:#E85555;
  --gold:#C8A84B;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── WATERMARK ── */
.watermark{position:fixed;right:-120px;top:-120px;width:500px;height:500px;opacity:.04;pointer-events:none;z-index:0;}
.watermark svg{width:100%;height:100%;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 20%, rgba(74,67,192,.15) 0%, transparent 60%), radial-gradient(ellipse at 20% 80%, rgba(77,204,168,.08) 0%, transparent 50%);pointer-events:none;}
.login-rings{position:absolute;right:-200px;top:-200px;width:700px;height:700px;pointer-events:none;opacity:.06;}
.login-rings circle{fill:none;stroke:var(--accent);}
.login-box{background:rgba(36,29,0,.95);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1;backdrop-filter:blur(10px);box-shadow:0 24px 80px rgba(0,0,0,.5);}
.login-logo-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.login-logo{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;padding:10px;}
.login-logo img{width:100%;filter:invert(10%) sepia(20%) saturate(600%) hue-rotate(20deg) brightness(35%);}
.login-brand{margin-bottom:28px;text-align:center;}
.login-brand h1{font-size:22px;font-weight:800;letter-spacing:.06em;color:var(--text);margin-bottom:2px;}
.login-brand .tagline{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:.12em;text-transform:uppercase;}
.login-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:20px 0;}
.login-box label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.login-box input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:11px 13px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:14px;transition:border-color .2s;}
.login-box input:focus{outline:none;border-color:var(--accent);background:rgba(0,0,0,.4);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1A1600;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:4px;font-family:'Inter',sans-serif;}
.login-btn:hover{opacity:.9;}
.login-err{background:rgba(232,85,85,.12);border:1px solid rgba(232,85,85,.25);color:#f08c8b;border-radius:8px;padding:9px 12px;font-size:12px;margin-top:10px;display:none;}
.login-footer{margin-top:24px;text-align:center;font-size:11px;color:var(--border2);}
.login-footer span{color:var(--muted);}

/* ── SIDEBAR ── */
.app{display:none;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;overflow:hidden;}
.sidebar-glow{position:absolute;bottom:-100px;left:-50px;width:300px;height:300px;background:radial-gradient(circle,rgba(74,67,192,.12) 0%,transparent 70%);pointer-events:none;}
.sidebar-top{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-brand{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sb-logo{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;padding:6px;flex-shrink:0;}
.sb-logo img{width:100%;filter:invert(10%) sepia(20%) saturate(600%) hue-rotate(20deg) brightness(35%);}
.sb-brand-name{font-size:13px;font-weight:800;letter-spacing:.05em;}
.sb-brand-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:1px;}
.user-card{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.user-card-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.user-card-role{font-size:11px;color:var(--muted);}
.role-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;margin-top:6px;}
.role-mgmt{background:rgba(197,190,255,.15);color:var(--accent);border:1px solid rgba(197,190,255,.2);}
.role-sales{background:rgba(77,204,168,.12);color:var(--green);border:1px solid rgba(77,204,168,.2);}
.role-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:10px;color:var(--border2);font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 8px;margin:8px 0 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.nav-item:hover{background:var(--panel2);color:var(--text);}
.nav-item.active{background:rgba(197,190,255,.12);color:var(--accent);border:1px solid rgba(197,190,255,.15);}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);}
.sync-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
.sync-txt{font-size:11px;color:var(--green);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── MAIN ── */
.main{margin-left:230px;min-height:100vh;position:relative;}

/* ── TOPBAR ── */
.topbar{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:rgba(36,29,0,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:40;}
.topbar-left h2{font-size:16px;font-weight:700;letter-spacing:.01em;}
.topbar-left p{font-size:11px;color:var(--muted);margin-top:2px;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:100px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(197,190,255,.04),transparent);pointer-events:none;}
.stat-val{font-size:17px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}

/* ── TOOLBAR ── */
.toolbar{padding:12px 22px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);}
.search-wrap{position:relative;}
.search-wrap input{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px 8px 32px;font-size:13px;font-family:'Inter',sans-serif;width:180px;transition:border-color .2s;}
.search-wrap input:focus{outline:none;border-color:var(--accent2);width:220px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.add-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1A1600;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s;display:flex;align-items:center;gap:5px;}
.add-btn:hover{opacity:.9;}
.icon-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.icon-btn:hover{border-color:var(--accent2);color:var(--accent);}
.view-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:auto;}
.vbtn{background:transparent;border:none;color:var(--muted);padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.vbtn.active{background:rgba(197,190,255,.15);color:var(--accent);}

/* ── BOARD ── */
.board{display:flex;gap:12px;padding:18px 22px 40px;overflow-x:auto;}
.col{flex-shrink:0;width:250px;display:flex;flex-direction:column;gap:8px;}
.col-header{padding:10px 12px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;border:1px solid transparent;}
.col-title{font-size:12px;font-weight:600;letter-spacing:.02em;}
.col-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.col-body{flex:1;display:flex;flex-direction:column;gap:7px;min-height:80px;padding:2px 0;}
.stage-new .col-header{background:rgba(160,152,128,.06);border-color:rgba(160,152,128,.1);}.stage-new .col-title{color:var(--muted);}.stage-new .col-count{background:rgba(160,152,128,.12);color:var(--muted);}
.stage-discovery .col-header{background:rgba(56,138,221,.08);border-color:rgba(56,138,221,.15);}.stage-discovery .col-title{color:#85B7EB;}.stage-discovery .col-count{background:rgba(56,138,221,.15);color:#85B7EB;}
.stage-proposal .col-header{background:rgba(197,190,255,.08);border-color:rgba(197,190,255,.15);}.stage-proposal .col-title{color:var(--accent);}.stage-proposal .col-count{background:rgba(197,190,255,.15);color:var(--accent);}
.stage-negotiation .col-header{background:rgba(240,160,48,.08);border-color:rgba(240,160,48,.15);}.stage-negotiation .col-title{color:var(--amber);}.stage-negotiation .col-count{background:rgba(240,160,48,.15);color:var(--amber);}
.stage-won .col-header{background:rgba(77,204,168,.08);border-color:rgba(77,204,168,.15);}.stage-won .col-title{color:var(--green);}.stage-won .col-count{background:rgba(77,204,168,.15);color:var(--green);}
.stage-lost .col-header{background:rgba(232,85,85,.06);border-color:rgba(232,85,85,.1);}.stage-lost .col-title{color:#f08c8b;}.stage-lost .col-count{background:rgba(232,85,85,.12);color:#f08c8b;}

.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 13px;position:relative;cursor:grab;transition:all .2s;overflow:hidden;}
.card.flash{animation:flashCard .8s ease;}
@keyframes flashCard{0%{border-color:var(--accent);box-shadow:0 0 0 2px rgba(197,190,255,.3);}100%{border-color:var(--border);box-shadow:none;}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);opacity:0;transition:opacity .2s;}
.card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.card:hover::before{opacity:1;}
.card:active{cursor:grabbing;opacity:.85;transform:translateY(0);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:4px;}
.card-name{font-size:13px;font-weight:600;padding-right:16px;line-height:1.3;}
.card-prob{font-size:11px;font-weight:700;white-space:nowrap;}
.prob-high{color:var(--green)}.prob-mid{color:var(--amber)}.prob-low{color:#f08c8b}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:400;}
.card-divider{height:1px;background:var(--border);margin:7px 0;}
.card-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.lbl{color:var(--muted);font-weight:400;}.val{color:var(--text);font-weight:500;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.tag-p{background:rgba(197,190,255,.12);color:var(--accent);border:1px solid rgba(197,190,255,.15);}
.tag-r{background:rgba(232,85,85,.1);color:#f08c8b;border:1px solid rgba(232,85,85,.15);}
.tag-a{background:rgba(77,204,168,.1);color:var(--green);border:1px solid rgba(77,204,168,.15);}
.card-footer{margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-size:10px;color:var(--border2);display:flex;justify-content:space-between;align-items:center;gap:6px;}
.del-btn{background:rgba(232,85,85,.12);border:1px solid rgba(232,85,85,.25);color:#f08c8b;font-size:11px;cursor:pointer;padding:3px 10px;border-radius:5px;font-weight:600;transition:all .15s;font-family:'Inter',sans-serif;}
.del-btn:hover{background:rgba(232,85,85,.3);color:#ff6b6b;}
.drop-zone{border:1.5px dashed var(--border);border-radius:10px;min-height:60px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--border);transition:all .15s;}
.drop-zone.active{border-color:var(--accent2);color:var(--accent);background:rgba(197,190,255,.04);}

/* ── TABLE ── */
.table-wrap{padding:18px 22px 40px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1000px;}
thead th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
thead th:hover{color:var(--text);}
tbody tr{border-bottom:1px solid rgba(61,54,0,.5);cursor:pointer;transition:background .15s;}
tbody tr:hover{background:rgba(197,190,255,.04);}
tbody td{padding:10px 12px;vertical-align:top;}
.td-name{font-weight:600;color:var(--text)}.td-muted{color:var(--muted)}.td-gpv{font-weight:600;color:var(--accent)}
.stage-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;font-family:'Inter',sans-serif;}
.pill-new{background:rgba(160,152,128,.12);color:var(--muted);}.pill-discovery{background:rgba(56,138,221,.15);color:#85B7EB;}
.pill-proposal{background:rgba(197,190,255,.15);color:var(--accent);}.pill-negotiation{background:rgba(240,160,48,.15);color:var(--amber);}
.pill-won{background:rgba(77,204,168,.15);color:var(--green);}.pill-lost{background:rgba(232,85,85,.12);color:#f08c8b;}
.td-risk{color:#f08c8b;}.td-action{color:var(--green);}

/* ── ANALYTICS ── */
.analytics-wrap{padding:18px 22px 40px;}
.a-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.a-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.a-card::after{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(197,190,255,.06),transparent);pointer-events:none;}
.a-val{font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-.02em;}
.a-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;}
.a-sub{font-size:11px;color:var(--green);margin-top:2px;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.chart-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:7px;}
.chart-card h3 .ch-icon{font-size:14px;}
.chart-card canvas{max-height:200px;}
.chart-full{grid-column:1/-1;}
.closing-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.closing-table th{padding:8px 10px;text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.closing-table td{padding:8px 10px;border-bottom:1px solid rgba(61,54,0,.4);}
.closing-name{font-weight:600;color:var(--text);}
.days-urgent{color:#f08c8b;font-weight:700;}
.days-soon{color:var(--amber);font-weight:600;}
.days-ok{color:var(--green);font-weight:500;}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr;}.chart-full{grid-column:1;}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:560px;margin:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.modal-icon{width:32px;height:32px;background:rgba(197,190,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.modal h3{font-size:16px;font-weight:700;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
.form-grid .full{grid-column:1/-1;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent2);background:rgba(0,0,0,.35);}
.field select[multiple]{height:88px;}
.field select option{background:var(--panel2);}
.hint-sm{font-size:11px;color:var(--muted);margin-top:3px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.modal-btns button{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--border)!important;}
.btn-cancel:hover{border-color:var(--border2)!important;color:var(--text);}
.btn-save{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1A1600;}
.btn-save:hover{opacity:.9;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;}
.loading-logo{width:56px;height:56px;background:var(--accent);border-radius:16px;padding:10px;}
.loading-logo img{width:100%;filter:invert(10%) sepia(20%) saturate(600%) hue-rotate(20deg) brightness(35%);}
.spinner{width:28px;height:28px;border:2.5px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--muted);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1A1600;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s;z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(155,148,245,.3);}
.toast.show{opacity:1;}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- WATERMARK -->
<div class="watermark">
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <circle cx="250" cy="250" r="80" fill="none" stroke="#C5BEFF" stroke-width="1"/>

const STAGES=[{id:'new',label:'New lead'},{id:'discovery',label:'Discovery'},{id:'proposal',label:'Proposal sent'},{id:'negotiation',label:'Negotiation'},{id:'won',label:'Closed won'},{id:'lost',label:'Closed lost'}];
const PROB={new:10,discovery:25,proposal:50,negotiation:75,won:100,lost:0};

let sb=null,deals=[],currentUser=null,dragId=null,editId=null,view='board',activeTab='pipeline',sortKey='updated',sortDir=-1,channel=null,charts={};

window.onload=async()=>{
  if(SUPABASE_URL==='YOUR_SUPABASE_URL'){showScreen('login');return;}
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const saved=localStorage.getItem('mpg_session');
  if(saved){try{currentUser=JSON.parse(saved);await fetchDeals();startApp();}catch(e){localStorage.removeItem('mpg_session');showScreen('login');}}
  else showScreen('login');
};

function showScreen(s){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('login-screen').classList.toggle('hidden',s!=='login');
  document.getElementById('app').style.display=s==='app'?'block':'none';
}

function login(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const user=USERS.find(x=>x.username===u&&x.password===p);
  if(!user){showLoginErr('Incorrect username or password.');return;}
  currentUser=user;localStorage.setItem('mpg_session',JSON.stringify(user));
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading-txt').textContent='Loading your pipeline…';
  document.getElementById('login-screen').classList.add('hidden');
  fetchDeals().then(()=>startApp());
}

function showLoginErr(msg){const e=document.getElementById('login-err');e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}

function logout(){
  if(channel)sb.removeChannel(channel);
  Object.values(charts).forEach(c=>c.destroy&&c.destroy());
  charts={};currentUser=null;localStorage.removeItem('mpg_session');location.reload();
}

async function fetchDeals(){const{data,error}=await sb.from('deals').select('*').order('created_at',{ascending:false});if(!error&&data)deals=data;}
async function upsertDeal(d){const{error}=await sb.from('deals').upsert(d);if(error){showToast('Save failed');console.error(error);}}
async function deleteDealDB(id){const{error}=await sb.from('deals').delete().eq('id',id);if(error)showToast('Delete failed');}

function startApp(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display='block';
  const u=currentUser;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role-txt').textContent=u.role==='management'?'Management':'Sales Representative';
  const b=document.getElementById('sb-badge');
  b.innerHTML=(u.role==='management'?'<span class="role-dot"></span>Manager':'<span class="role-dot"></span>Sales Rep');
  b.className='role-pill '+(u.role==='management'?'role-mgmt':'role-sales');
  buildNav();subscribeRealtime();renderMain();
}

function buildNav(){
  const nav=document.getElementById('sidebar-nav');
  const items=currentUser.role==='management'
    ?[{id:'pipeline',icon:'📊',label:'Full Pipeline'},{id:'analytics',icon:'📈',label:'Analytics'}]
    :[{id:'pipeline',icon:'📊',label:'My Pipeline'}];
  nav.innerHTML='<div class="nav-section">Navigation</div>'+items.map(i=>`<button class="nav-item ${i.id===activeTab?'active':''}" onclick="setTab('${i.id}')"><span class="nav-icon">${i.icon}</span>${i.label}</button>`).join('');
}

function setTab(t){activeTab=t;buildNav();renderMain();}

function subscribeRealtime(){
  channel=sb.channel('deals-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'deals'},p=>{
      if(p.eventType==='INSERT'){if(!deals.find(d=>d.id===p.new.id))deals.unshift(p.new);}
      else if(p.eventType==='UPDATE'){const i=deals.findIndex(d=>d.id===p.new.id);if(i>-1)deals[i]=p.new;else deals.unshift(p.new);}
      else if(p.eventType==='DELETE'){deals=deals.filter(d=>d.id!==p.old.id);}
      renderMain();
    })
    .subscribe(s=>{
      const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-txt');
      if(s==='SUBSCRIBED'){dot.style.background='#4DCCA8';txt.textContent='Live sync';txt.style.color='#4DCCA8';}
      else{dot.style.background='#E85555';txt.textContent='Reconnecting…';txt.style.color='#E85555';}
    });
}

function myDeals(){return deals;}

function renderMain(){
  const c=document.getElementById('main-content');
  activeTab==='analytics'&&currentUser.role==='management'?renderAnalytics(c):renderPipelinePage(c);
}

function renderPipelinePage(c){
  const list=myDeals();
  const active=list.filter(d=>d.stage!=='lost');
  const gpv=active.reduce((s,d)=>s+(d.gpv||0),0);
  const weighted=active.reduce((s,d)=>s+(d.gpv||0)*(d.prob||0)/100,0);
  c.innerHTML=`
    <div class="topbar">
      <div class="topbar-left">
        <h2>${currentUser.role==='management'?'Full Pipeline':'My Pipeline'}</h2>
        <p>${currentUser.role==='management'?'All team deals':'Full team pipeline — assign and track deals'}</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val">${list.length}</div><div class="stat-lbl">Total deals</div></div>
        <div class="stat-card"><div class="stat-val">${fmt(gpv)}</div><div class="stat-lbl">Pipeline GPV</div></div>
        <div class="stat-card"><div class="stat-val">${fmt(weighted)}</div><div class="stat-lbl">Weighted</div></div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="search" placeholder="Search deals…" oninput="renderPipelineContent()" /></div>
      <button class="add-btn" onclick="openModal(null)">＋ New deal</button>
      ${currentUser.role==='management'?'<button class="icon-btn" onclick="exportCSV()">Export CSV</button>':''}
      <div class="view-toggle">
        <button class="vbtn ${view==='board'?'active':''}" onclick="setView('board')">Board</button>
        <button class="vbtn ${view==='table'?'active':''}" onclick="setView('table')">Table</button>
      </div>
    </div>
    <div id="pipeline-content"></div>`;
  renderPipelineContent();
}

function renderPipelineContent(){
  const el=document.getElementById('pipeline-content');if(!el)return;
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const list=myDeals().filter(d=>!q||[d.name,d.industry,d.owner,d.action,d.risk].some(v=>(v||'').toLowerCase().includes(q)));
  view==='board'?renderBoard(el,list):renderTable(el,list);
}

function setView(v){view=v;renderPipelineContent();}

function renderBoard(el,list){
  el.innerHTML=`<div class="board">${STAGES.map(stage=>{
    const sd=list.filter(d=>d.stage===stage.id);
    return `<div class="col stage-${stage.id}">
      <div class="col-header"><span class="col-title">${stage.label}</span><span class="col-count">${sd.length}</span></div>
      <div class="col-body" data-stage="${stage.id}" ondragover="dragOver(event)" ondrop="drop(event,this)">
        ${sd.length===0?`<div class="drop-zone" ondragover="event.preventDefault();this.classList.add('active')" ondragleave="this.classList.remove('active')" ondrop="drop(event,this.parentElement)">Drop here</div>`:''}
        ${sd.map(d=>cardHTML(d)).join('')}
      </div></div>`;
  }).join('')}</div>`;
}

function cardHTML(d){
  const pc=d.prob>=70?'prob-high':d.prob>=40?'prob-mid':'prob-low';
  const days=daysUntil(d.close_date);
  let cl=d.close_date||'—',cc='color:var(--muted)';
  if(days!==null){if(days<0){cl='Overdue '+Math.abs(days)+'d';cc='color:var(--red)';}else if(days===0){cl='Closes today';cc='color:var(--amber)';}else if(days<=7){cl='in '+days+'d';cc='color:var(--amber)';}}
  return `<div class="card" draggable="true" ondragstart="dragStart(event,'${d.id}')" ondblclick="openModal('${d.id}')">
    <div class="card-top"><div class="card-name">${esc(d.name)}</div><div class="card-prob ${pc}">${d.prob!==undefined?d.prob+'%':'—'}</div></div>
    <div class="card-meta">${esc(d.industry||'—')}${d.owner?' · '+esc(d.owner):''}</div>
    <div class="card-divider"></div>
    <div class="card-row"><span class="lbl">Est. GPV</span><span class="val" style="color:var(--accent)">${d.gpv?fmt(d.gpv)+' SAR':'—'}</span></div>
    <div class="card-row"><span class="lbl">Close date</span><span class="val" style="${cc}">${cl}</span></div>
    ${d.products&&d.products.length?`<div class="card-tags">${d.products.slice(0,2).map(p=>`<span class="tag tag-p">${esc(p)}</span>`).join('')}${d.products.length>2?`<span class="tag tag-p">+${d.products.length-2}</span>`:''}</div>`:''}
    ${d.action?`<div class="card-tags"><span class="tag tag-a">▶ ${esc(d.action.length>42?d.action.slice(0,42)+'…':d.action)}</span></div>`:''}
    ${d.risk?`<div class="card-tags"><span class="tag tag-r">⚠ ${esc(d.risk.length>42?d.risk.slice(0,42)+'…':d.risk)}</span></div>`:''}
    <div class="card-footer"><span>${d.updated||''}</span><button class="del-btn" onclick="event.stopPropagation();deleteDeal('${d.id}')" title="Delete">🗑 Delete</button></div>
  </div>`;
}

function renderTable(el,list){
  const s=[...list].sort((a,b)=>{let av=a[sortKey]||'',bv=b[sortKey]||'';if(['gpv','prob'].includes(sortKey)){av=+av;bv=+bv;}return av<bv?sortDir:av>bv?-sortDir:0;});
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr>
      <th onclick="sortTable('name')">Account</th><th onclick="sortTable('industry')">Industry</th>
      <th onclick="sortTable('gpv')">GPV (SAR)</th><th>Stage</th><th>Products</th>
      <th onclick="sortTable('prob')">Prob %</th><th onclick="sortTable('close_date')">Close Date</th>
      <th>Next Action</th>${currentUser.role==='management'?'<th>Owner</th>':''}
      <th>Contact</th><th>Phone</th><th>Risk</th><th onclick="sortTable('updated')">Updated</th>
    </tr></thead>
    <tbody>${s.length?s.map(d=>{
      const pc=d.prob>=70?'prob-high':d.prob>=40?'prob-mid':'prob-low';
      const pill=`<span class="stage-pill pill-${d.stage}">${STAGES.find(x=>x.id===d.stage)?.label||d.stage}</span>`;
      return `<tr onclick="openModal('${d.id}')">
        <td class="td-name">${esc(d.name)}</td><td class="td-muted">${esc(d.industry||'—')}</td>
        <td class="td-gpv">${d.gpv?fmt(d.gpv):'—'}</td><td>${pill}</td>
        <td class="td-muted">${(d.products||[]).slice(0,2).join(', ')||'—'}</td>
        <td class="${pc}">${d.prob!==undefined?d.prob+'%':'—'}</td>
        <td class="td-muted">${d.close_date||'—'}</td>
        <td class="td-action">${esc(d.action||'—')}</td>
        ${currentUser.role==='management'?`<td class="td-muted">${esc(d.owner||'—')}</td>`:''}
        <td class="td-risk">${esc(d.risk||'—')}</td>
        <td class="td-muted">${d.updated||'—'}</td>
      </tr>`;
    }).join(''):'<tr><td colspan="11" style="text-align:center;color:var(--muted);padding:40px 0;">No deals yet — click + New deal to start.</td></tr>'}</tbody>
  </table></div>`;
}

function sortTable(k){sortKey===k?sortDir*=-1:(sortKey=k,sortDir=-1);renderPipelineContent();}

function renderAnalytics(c){
  const list=deals,active=list.filter(d=>d.stage!=='lost');
  const won=list.filter(d=>d.stage==='won'),lost=list.filter(d=>d.stage==='lost');
  const closed=won.length+lost.length,winRate=closed?Math.round(won.length/closed*100):0;
  const totalGpv=active.reduce((s,d)=>s+(d.gpv||0),0);
  const weighted=active.reduce((s,d)=>s+(d.gpv||0)*(d.prob||0)/100,0);
  const wonGpv=won.reduce((s,d)=>s+(d.gpv||0),0);
  const closing=list.filter(d=>d.stage!=='won'&&d.stage!=='lost'&&d.close_date&&daysUntil(d.close_date)!==null&&daysUntil(d.close_date)<=30).sort((a,b)=>new Date(a.close_date)-new Date(b.close_date));
  const reps=USERS.filter(u=>u.role==='sales');
  const gpvByRep=reps.map(r=>({name:r.name,gpv:list.filter(d=>d.owner===r.name&&d.stage!=='lost').reduce((s,d)=>s+(d.gpv||0),0),deals:list.filter(d=>d.owner===r.name).length}));
  const byStage=STAGES.filter(s=>s.id!=='lost').map(s=>({label:s.label,count:list.filter(d=>d.stage===s.id).length}));
  const indMap={};list.forEach(d=>{if(d.industry)indMap[d.industry]=(indMap[d.industry]||0)+1;});

  c.innerHTML=`
    <div class="topbar">
      <div class="topbar-left"><h2>Analytics Dashboard</h2><p>Team performance overview</p></div>
    </div>
    <div class="analytics-wrap">
      <div class="a-grid">
        <div class="a-card"><div class="a-val">${list.length}</div><div class="a-lbl">Total Deals</div></div>
        <div class="a-card"><div class="a-val">${fmt(totalGpv)}</div><div class="a-lbl">Pipeline GPV (SAR)</div><div class="a-sub">Excl. lost deals</div></div>
        <div class="a-card"><div class="a-val">${fmt(weighted)}</div><div class="a-lbl">Weighted Pipeline</div></div>
        <div class="a-card"><div class="a-val">${winRate}%</div><div class="a-lbl">Win Rate</div><div class="a-sub">${won.length} won · ${lost.length} lost</div></div>
        <div class="a-card"><div class="a-val">${closing.length}</div><div class="a-lbl">Closing This Month</div></div>
        <div class="a-card"><div class="a-val">${fmt(wonGpv)}</div><div class="a-lbl">Won GPV (SAR)</div></div>
      </div>
      <div class="charts-grid">
        <div class="chart-card"><h3><span class="ch-icon">📊</span>Pipeline by Stage</h3><canvas id="chart-stage"></canvas></div>
        <div class="chart-card"><h3><span class="ch-icon">💰</span>GPV by Sales Rep (SAR)</h3><canvas id="chart-rep"></canvas></div>
        <div class="chart-card"><h3><span class="ch-icon">🏭</span>Deals by Industry</h3><canvas id="chart-industry"></canvas></div>
        <div class="chart-card"><h3><span class="ch-icon">👥</span>Deals Count by Rep</h3><canvas id="chart-rep-count"></canvas></div>
        <div class="chart-card chart-full">
          <h3><span class="ch-icon">⏰</span>Closing in Next 30 Days</h3>
          ${closing.length===0?'<div style="color:var(--muted);font-size:13px;padding:12px 0;">No deals closing in the next 30 days.</div>':`
          <table class="closing-table">
            <thead><tr><th>Account</th><th>Owner</th><th>GPV (SAR)</th><th>Stage</th><th>Prob %</th><th>Close Date</th><th>Days Left</th></tr></thead>
            <tbody>${closing.map(d=>{
              const days=daysUntil(d.close_date);
              const dc=days<=7?'days-urgent':days<=14?'days-soon':'days-ok';
              const pill=`<span class="stage-pill pill-${d.stage}">${STAGES.find(s=>s.id===d.stage)?.label||d.stage}</span>`;
              return `<tr><td class="closing-name">${esc(d.name)}</td><td style="color:var(--muted)">${esc(d.owner||'—')}</td><td style="color:var(--accent);font-weight:600">${d.gpv?fmt(d.gpv):'—'}</td><td>${pill}</td><td>${d.prob||'—'}%</td><td style="color:var(--muted)">${d.close_date}</td><td class="${dc}">${days===0?'Today':days+'d'}</td></tr>`;
            }).join('')}</tbody>
          </table>`}
        </div>
      </div>
    </div>`;

  Object.values(charts).forEach(ch=>ch.destroy&&ch.destroy());charts={};
  const gt={color:'rgba(160,152,128,.6)',grid:{color:'rgba(61,54,0,.6)'}};
  const tp={backgroundColor:'#241D00',borderColor:'#3D3600',borderWidth:1,titleColor:'#F5F3E8',bodyColor:'#A09880',padding:10};
  const ac=['#534AB7','#2A5C9A','#2A7A5A','#9A6A1A','#7A2A2A','#2A7A7A','#6B4A1A','#4A2A7A'];

  charts.stage=new Chart(document.getElementById('chart-stage'),{type:'bar',data:{labels:byStage.map(s=>s.label),datasets:[{data:byStage.map(s=>s.count),backgroundColor:['#3D3600','#2A5C9A','#534AB7','#9A6A1A','#2A7A5A'],borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:tp},scales:{x:{ticks:gt,grid:gt},y:{ticks:{...gt,stepSize:1},grid:gt}}}});
  charts.rep=new Chart(document.getElementById('chart-rep'),{type:'bar',data:{labels:gpvByRep.map(r=>r.name),datasets:[{data:gpvByRep.map(r=>r.gpv),backgroundColor:'#534AB7',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{...tp,callbacks:{label:ctx=>fmt(ctx.raw)+' SAR'}}},scales:{x:{ticks:gt,grid:gt},y:{ticks:{...gt,callback:v=>fmt(v)},grid:gt}}}});
  const iL=Object.keys(indMap);
  charts.ind=new Chart(document.getElementById('chart-industry'),{type:'doughnut',data:{labels:iL,datasets:[{data:iL.map(l=>indMap[l]),backgroundColor:ac.slice(0,iL.length),borderColor:'#1A1600',borderWidth:2}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{color:'rgba(245,243,232,.7)',font:{size:11},padding:12}},tooltip:tp}}});
  charts.rc=new Chart(document.getElementById('chart-rep-count'),{type:'bar',data:{labels:gpvByRep.map(r=>r.name),datasets:[{data:gpvByRep.map(r=>r.deals),backgroundColor:'#2A7A5A',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:tp},scales:{x:{ticks:gt,grid:gt},y:{ticks:{...gt,stepSize:1},grid:gt}}}});
}

function openModal(id){
  editId=id;
  document.getElementById('modal-title').textContent=id?'Edit deal':'New deal';
  const deleteBtn=document.getElementById('delete-btn');
  if(deleteBtn) deleteBtn.style.display=id?'block':'none';
  const d=id?deals.find(x=>x.id===id):{};
  const of=document.getElementById('owner-field'),os=document.getElementById('f-owner');
  of.style.display='block';
  os.innerHTML=USERS.filter(u=>u.role==='sales').map(u=>`<option value="${u.name}" ${(d.owner||'')===u.name?'selected':''}>${u.name}</option>`).join('');
  if(!id) os.value=currentUser.role==='sales'?currentUser.name:(USERS.find(u=>u.role==='sales')?.name||'');
  document.getElementById('f-name').value=d.name||'';
  document.getElementById('f-industry').value=d.industry||'';
  document.getElementById('f-gpv').value=d.gpv||'';
  document.getElementById('f-stage').value=d.stage||'new';
  document.getElementById('f-prob').value=d.prob!==undefined?d.prob:'';
  document.getElementById('f-close').value=d.close_date||'';
  document.getElementById('f-action').value=d.action||'';
  document.getElementById('f-support').value=d.support||'';
  document.getElementById('f-risk').value=d.risk||'';
  document.getElementById('f-contact').value=d.contact_name||'';
  document.getElementById('f-contact-phone').value=d.contact_phone||'';
  const sel=document.getElementById('f-product');
  Array.from(sel.options).forEach(o=>o.selected=(d.products||[]).includes(o.value));
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),80);
}

function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;}
async function deleteFromModal(){
  if(!editId)return;
  if(!confirm('Delete this deal permanently?'))return;
  await deleteDealDB(editId);
  deals=deals.filter(d=>d.id!==editId);
  closeModal();renderMain();showToast('Deal deleted');
}
function bgClick(e){if(e.target.id==='modal')closeModal();}

async function saveModal(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('Account name required');return;}
  const stage=document.getElementById('f-stage').value;
  const probRaw=document.getElementById('f-prob').value;
  const products=Array.from(document.getElementById('f-product').selectedOptions).map(o=>o.value);
  const owner=document.getElementById('f-owner').value||currentUser.name;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Saving…';
  const prevOwner=editId?(deals.find(x=>x.id===editId)?.owner||null):null;
  const ownerChanged=prevOwner&&prevOwner!==owner;
  const autoStage=(!editId||ownerChanged)&&stage==='new'?'discovery':stage;
  const d={id:editId||uid(),name,industry:document.getElementById('f-industry').value,gpv:+document.getElementById('f-gpv').value||0,stage:autoStage,products,prob:probRaw!==''?+probRaw:PROB[autoStage],close_date:document.getElementById('f-close').value,owner,action:document.getElementById('f-action').value.trim(),support:document.getElementById('f-support').value.trim(),risk:document.getElementById('f-risk').value.trim(),updated:today(),contact_name:document.getElementById('f-contact').value.trim(),contact_phone:document.getElementById('f-contact-phone').value.trim()};
  await upsertDeal(d);
  if(editId){const i=deals.findIndex(x=>x.id===editId);if(i>-1)deals[i]=d;}
  else{if(!deals.find(x=>x.id===d.id))deals.unshift(d);}
  btn.disabled=false;btn.textContent='Save deal';
  closeModal();renderMain();
  if(!editId)showToast('✓ Assigned to '+owner+' — moved to Discovery');
  else if(ownerChanged)showToast('✓ Reassigned to '+owner);
  else showToast('Deal updated ✓');
}

async function deleteDeal(id){
  if(!confirm('Remove this deal?'))return;
  await deleteDealDB(id);deals=deals.filter(d=>d.id!==id);renderMain();showToast('Deal removed');
}

function dragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();}
async function drop(e,el){
  e.preventDefault();
  const stage=el.dataset.stage||el.closest('[data-stage]')?.dataset.stage;
  if(!stage||!dragId)return;
  const d=deals.find(x=>x.id===dragId);
  if(d&&d.stage!==stage){

    d.stage=stage;d.prob=PROB[stage];d.updated=today();
    renderMain();await upsertDeal(d);showToast('Moved to '+STAGES.find(s=>s.id===stage).label);
  }
  dragId=null;
}

function exportCSV(){
  if(!deals.length){showToast('No deals');return;}
  const h=['Account Name','Industry','Est. GPV (SAR)','Deal Stage','Product Scope','Probability (%)','Expected Close Date','Next Action','Deal Owner','Support Needed','Risk / Blocker','Contact Name','Contact Phone','Last Updated'];
  const rows=[h,...deals.map(d=>[d.name,d.industry||'',d.gpv||0,STAGES.find(s=>s.id===d.stage)?.label||d.stage,(d.products||[]).join('; '),d.prob||0,d.close_date||'',d.action||'',d.owner||'',d.support||'',d.risk||'',d.contact_name||'',d.contact_phone||'',d.updated||''])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='pipeline-'+today()+'.csv';a.click();showToast('Exported ✓');
}

function uid(){return Date.now()+Math.random().toString(36).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function fmt(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':Math.round(n).toLocaleString();}
function daysUntil(ds){if(!ds)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(ds)-t)/86400000);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){const d=document.createElement('div');d.innerText=s||'';return d.innerHTML;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('l-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
